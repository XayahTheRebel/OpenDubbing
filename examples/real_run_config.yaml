# 真实运行配置：中文输出、Qwen3 ASR、NLLB 翻译、CosyVoice2 TTS、MuseTalk 1.5 口型

target_language: "zh"
sample_rate: 16000

workspace:
  root: "./workspace_real_run"

providers:
  audio_separation:
    name: demucs
    model: "htdemucs"
    options: { device: "auto" }
  noise_reduction:
    name: deep_filter_net3
  vad:
    name: silero_vad
    options: { threshold: 0.5, min_silence_ms: 500 }
  asr:
    name: qwen3_asr
    options: { source_language: "auto" }
  forced_alignment:
    name: qwen3_forced_aligner
  translation:
    name: nllb
    model: "facebook/nllb-200-distilled-600M"
  tts:
    name: cosyvoice2
    model: "C:\\CosyVoice\\pretrained_models\\CosyVoice2-0.5B"
    options:
      conda_env: "CosyVoice"
      sample_rate: 22050
  face:
    name: musetalk
    options:
      musetalk_root: "C:\\MuseTalk"
      conda_env: "MuseTalk"
      version: "v15"
      vae_type: "sd-vae-ft-mse"
      gpu_id: 0
      batch_size: 8
      use_float16: false

pipeline:
  steps:
    - input
    - asr
    - timeline
    - translation
    - length_optimizer
    - prosody
    - tts
    - audio_post
    - face
    - video_post
    - output

output:
  filename: "output.mp4"
  format: "mp4"
  codec: "libx264"

api:
  host: "127.0.0.1"
  port: 8000
